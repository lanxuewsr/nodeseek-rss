name: Docker Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dockerhub
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials are configured; images will be pushed."
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials are not configured; building without push."
          fi

      - uses: docker/login-action@v3
        if: steps.dockerhub.outputs.push == 'true'
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          tags: |
            lanxuewsr/nodeseek-rss:1.0.1
            lanxuewsr/nodeseek-rss:latest
